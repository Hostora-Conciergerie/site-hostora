<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — Hostora Conciergerie</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#3d5c4a">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233d5c4a'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23f6ece4' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf7f2;--surface:#ffffff;--ink:#2b2a26;--muted:#454138;
    --line:#e7e1d6;--accent:#3d5c4a;--accent-2:#33503f;--terra:#c07a52;
    --radius:18px;--shadow:0 24px 60px -34px rgba(43,42,38,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;font-weight:500;color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased;
    background-color:var(--bg);
    background-image:radial-gradient(rgba(61,92,74,.05) 1px,transparent 1.5px),radial-gradient(1000px 600px at 90% -10%,rgba(192,122,82,.1),transparent 58%),radial-gradient(900px 520px at -12% 20%,rgba(61,92,74,.08),transparent 56%);
    background-size:26px 26px,auto,auto;background-repeat:repeat,no-repeat,no-repeat;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    max-width:560px;width:100%;padding:48px 40px;text-align:center}
  .check{width:76px;height:76px;margin:0 auto 26px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center}
  .check svg{width:38px;height:38px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(28px,5vw,38px);line-height:1.15;letter-spacing:-.015em;margin-bottom:16px}
  p{font-size:18px;color:var(--muted);margin-bottom:14px}
  p.small{font-size:15px;opacity:.9}
  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:30px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;
    padding:15px 28px;border-radius:999px;font-size:16px;font-weight:500;text-decoration:none;transition:background .2s,transform .15s;border:none;cursor:pointer}
  .btn:hover{background:var(--accent-2);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  .btn-ghost:hover{background:#eef2ee}
  .brand{margin-bottom:34px;font-family:'Fraunces',serif}
  .brand .h{font-style:italic;font-weight:700;font-size:34px;color:#bf8a30}
  .brand .rest{font-size:24px;font-weight:600;color:var(--ink);letter-spacing:.02em}
  .brand em{display:block;font-style:normal;font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--accent);margin-top:3px;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="h">H</span><span class="rest">ostora</span><em>Conciergerie</em></div>
    <div class="check"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12.5l5 5L20 6.5"/></svg></div>
    <h1>Merci, votre message est bien parti !</h1>
    <p>On a bien reçu votre demande et on revient vers vous très vite — en général dans la journée.</p>
    <p class="small">Une urgence ? Appelez-nous directement au +33 7 49 24 12 01.</p>
    <div class="actions">
      <a href="/" class="btn">Retour à l'accueil</a>
      <a href="tel:+33749241201" class="btn btn-ghost">Nous appeler</a>
    </div>
  </div>
</body>
</html>
